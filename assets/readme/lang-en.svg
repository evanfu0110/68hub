<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="48" viewBox="0 0 1200 48" role="img" aria-labelledby="lang-en"><title id="lang-en">Switch to 中文</title><rect width="1200" height="48" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <g transform="translate(600 24)">
    <text x="-100" y="6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#1a1a2e" text-anchor="middle" font-weight="600">English</text>
    <rect x="-36" y="-11" width="1" height="22" rx="0.5" fill="#e2e8f0"/>
    <text x="40" y="6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">中文</text>
    <rect x="-4" y="16" width="8" height="8" rx="4" fill="#E85642" opacity="0.6"/>
  </g>
</svg>
