name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend + Electron
        run: pnpm build

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Package with electron-builder
        run: npx --yes electron-builder@25 --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate MD5
        id: md5
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path "release\68HUB Setup *.exe" -Algorithm MD5).Hash.ToLower()
          echo "md5=$hash" >> $env:GITHUB_OUTPUT
          echo "file=68HUB Setup $((Get-Item release\68HUB Setup*.exe).Name)" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## 68HUB ${{ github.ref_name }}

            OpenCode Go 平价 Coding Plan 用量统计桌面应用。

            ### 更新内容
            - 后端从 Python (FastAPI + PyInstaller) 迁移至 Node.js (Hono + better-sqlite3)，内嵌于 Electron 主进程
            - 单进程单安装包，告别双进程打包
            - 暗色模式：支持浅色/深色/跟随系统三种主题（Forest 暗色主题）
            - 系统托盘：关闭窗口时可最小化到托盘，后台继续同步
            - 首次启动引导：选择主题偏好与托盘行为
            - 设置页新增恢复默认设置按钮
            - 支持 Grok 模型图标显示
            - 关闭弹窗改为应用内 Modal，与主题风格一致
            - 修复与优化详见提交记录

            ### 功能
            - 📊 用量统计总览：账户配额、Token 消耗一目了然
            - 📈 各模型 Token 消耗排行与每日趋势
            - 📅 每日费用与请求量趋势分析
            - 📋 完整使用记录查询与筛选
            - ⚙️ 多账户管理与自动同步

            ### 文件校验
            - `${{ steps.md5.outputs.file }}` → MD5: `${{ steps.md5.outputs.md5 }}`
          files: |
            release/68HUB Setup *.exe
