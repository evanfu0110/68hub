name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend + Electron
        run: pnpm build

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Package with electron-builder
        run: npx --yes electron-builder@25 --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate MD5
        id: md5
        shell: pwsh
        run: |
          $exe = Get-ChildItem "release\68HUB Setup*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm MD5).Hash.ToLower()
          echo "md5=$hash" >> $env:GITHUB_OUTPUT
          echo "file=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Generate Release Body
        shell: pwsh
        run: |
          $changelog = Get-Content -Raw CHANGELOG.md
          $body = @"
$changelog

### 文件校验 | File Verification
- `${{ steps.md5.outputs.file }}` → MD5: `${{ steps.md5.outputs.md5 }}`
"@
          Set-Content -Path release_body.md -Value $body -Encoding utf8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            release/*.exe
            CHANGELOG.md
